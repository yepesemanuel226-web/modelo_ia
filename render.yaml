services:
  - type: web
    name: centro-medico-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:api --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
